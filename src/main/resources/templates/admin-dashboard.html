<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <!-- 🔷 TITLE -->
    <h3 class="mb-3">Admin Dashboard</h3>

    <!-- 🔷 TABS -->
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <a class="nav-link"
               th:classappend="${selectedType == 'MBA'} ? 'active'"
               th:href="@{/admin/dashboard(type='MBA')}">MBA</a>
        </li>
        <li class="nav-item">
            <a class="nav-link"
               th:classappend="${selectedType == 'HAHM'} ? 'active'"
               th:href="@{/admin/dashboard(type='HAHM')}">HAHM</a>
        </li>
        <li class="nav-item">
            <a class="nav-link"
               th:classappend="${selectedType == 'IPM'} ? 'active'"
               th:href="@{/admin/dashboard(type='IPM')}">IPM</a>
        </li>
    </ul>

    <!-- 🔷 SEARCH + UPLOAD -->
    <div class="d-flex justify-content-between align-items-center mb-3">

        <!-- SEARCH -->
        <form class="d-flex" method="get" th:action="@{/admin/dashboard}">
            <input type="hidden" name="type" th:value="${selectedType}" />

            <input class="form-control me-2"
                   type="search"
                   name="keyword"
                   placeholder="Search name/email"
                   th:value="${keyword}">

            <button class="btn btn-primary">Search</button>
        </form>

        <!-- UPLOAD -->
        <form method="post"
              enctype="multipart/form-data"
              th:action="@{/admin/upload}">

            <input type="hidden" name="type" th:value="${selectedType}" />

            <div class="d-flex">
                <input type="file" name="file" class="form-control me-2"  accept=".xlsx" required>
                <button class="btn btn-success">Upload</button>
            </div>
        </form>

    </div>

    <!-- 🔷 TABLE -->
    <div class="card shadow-sm">
        <div class="card-body table-responsive">

            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                <tr>
					<th>ID</th>
					                <th>Registration No</th>
					                <th>Full Name</th>
					                <th>Email</th>
					                <th>DOB</th>
					                <th>Status</th>
                </tr>
                </thead>

                <tbody>
					<tr th:each="s : ${students}">
					               <td th:text="${s.id}">1</td>
					               <td th:text="${s.registrationNo}">REG123</td>
					               <td th:text="${s.fullName}">John Doe</td>
					               <td th:text="${s.email}">john@example.com</td>
					               <td th:text="${s.dob}">2000-01-01</td>
					               <td th:text="${s.status != null ? s.status.name : ''}">Active</td>
					           </tr>

                <tr th:if="${students.size() == 0}">
                    <td colspan="5" class="text-center">No records found</td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>

	<nav class="mt-3">
	    <ul class="pagination justify-content-center">

	        <!-- First -->
	        <li class="page-item" th:classappend="${page.first} ? 'disabled'">
	            <a class="page-link"
	               th:href="@{/admin/dashboard(type=${selectedType}, page=0, keyword=${keyword})}">
	                First
	            </a>
	        </li>

	        <!-- Previous -->
	        <li class="page-item" th:classappend="${page.first} ? 'disabled'">
	            <a class="page-link"
	               th:href="@{/admin/dashboard(type=${selectedType}, page=${page.number - 1}, keyword=${keyword})}">
	                Previous
	            </a>
	        </li>

	        <!-- Show first page + ellipsis -->
	        <li class="page-item"
	            th:if="${page.number > 2}">
	            <a class="page-link"
	               th:href="@{/admin/dashboard(type=${selectedType}, page=0, keyword=${keyword})}">
	                1
	            </a>
	        </li>

	        <li class="page-item disabled"
	            th:if="${page.number > 3}">
	            <span class="page-link">...</span>
	        </li>

	        <!-- Page Window (current ±2) -->
	        <li class="page-item"
	            th:each="i : ${#numbers.sequence(
	                T(java.lang.Math).max(0, page.number - 2),
	                T(java.lang.Math).min(page.totalPages - 1, page.number + 2)
	            )}"
	            th:classappend="${i == page.number} ? 'active'">

	            <a class="page-link"
	               th:href="@{/admin/dashboard(type=${selectedType}, page=${i}, keyword=${keyword})}"
	               th:text="${i + 1}">
	            </a>
	        </li>

	        <!-- Ellipsis + last page -->
	        <li class="page-item disabled"
	            th:if="${page.number < page.totalPages - 4}">
	            <span class="page-link">...</span>
	        </li>

	        <li class="page-item"
	            th:if="${page.number < page.totalPages - 3}">
	            <a class="page-link"
	               th:href="@{/admin/dashboard(type=${selectedType}, page=${page.totalPages - 1}, keyword=${keyword})}"
	               th:text="${page.totalPages}">
	            </a>
	        </li>

	        <!-- Next -->
	        <li class="page-item" th:classappend="${page.last} ? 'disabled'">
	            <a class="page-link"
	               th:href="@{/admin/dashboard(type=${selectedType}, page=${page.number + 1}, keyword=${keyword})}">
	                Next
	            </a>
	        </li>

	        <!-- Last -->
	        <li class="page-item" th:classappend="${page.last} ? 'disabled'">
	            <a class="page-link"
	               th:href="@{/admin/dashboard(type=${selectedType}, page=${page.totalPages - 1}, keyword=${keyword})}">
	                Last
	            </a>
	        </li>

	    </ul>
	</nav>

</div>

</body>
</html>
