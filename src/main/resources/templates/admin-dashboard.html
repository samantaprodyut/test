<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard - Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<!-- Header Fragment -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-3 gap-3">
        <h2 class="mb-0">Admin Dashboard – Students</h2>

        <div class="d-flex flex-column flex-md-row align-items-md-center gap-2">
            <input type="text"
                   id="studentSearch"
                   class="form-control form-control-sm"
                   placeholder="Search by Reg. No or Name">

				   <form th:action="@{/admin/upload-candidates}"
				           method="post"
				           enctype="multipart/form-data"
				           class="d-flex gap-2">
				         <input type="file"
				                name="file"
				                class="form-control form-control-sm"
				                accept=".xlsx"
				                required>
				         <button type="submit" class="btn btn-primary btn-sm">
				             Upload
				         </button>
				     </form>
            <a th:href="@{/admin/logout}" class="btn btn-outline-danger btn-sm">
                Logout
            </a>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-bordered align-middle" id="studentsTable">
            <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Registration No</th>
                <th>Full Name</th>
                <th>Email</th>
                <th>DOB</th>
				<th>Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${students}">
                <td th:text="${s.id}">1</td>
                <td th:text="${s.registrationNo}">REG123</td>
                <td th:text="${s.fullName}">John Doe</td>
                <td th:text="${s.email}">john@example.com</td>
                <td th:text="${s.dob}">2000-01-01</td>
<!--				<td th:text="${s.candidate_current_status != null ? s.status.name : ''}">Admitted</td> -->

            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Footer Fragment -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Simple client-side search JS, aligned with Thymeleaf-rendered table -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/admin-dashboard.js"></script>

</body>
</html>
