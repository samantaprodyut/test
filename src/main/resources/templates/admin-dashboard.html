<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard - Students</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

<!-- Header -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5">

    <!-- Top Bar -->
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-3 gap-3">
        <h2 class="mb-0">Admin Dashboard – Students</h2>

        <div class="d-flex flex-column flex-md-row align-items-md-center gap-2">

            <!-- Search -->
            <input type="text"
                   id="studentSearch"
                   class="form-control form-control-sm"
                   placeholder="Search by Reg. No or Name"
                   th:value="${search}">

            <!-- Upload -->
            <form th:action="@{/admin/upload-candidates}"
                  method="post"
                  enctype="multipart/form-data"
                  class="d-flex gap-2">

                <input type="file"
                       name="file"
                       class="form-control form-control-sm"
                       accept=".xlsx"
                       required>

                <button type="submit" class="btn btn-primary btn-sm">
                    Upload
                </button>
            </form>

            <!-- Logout -->
            <a th:href="@{/admin/logout}" class="btn btn-outline-danger btn-sm">
                Logout
            </a>
        </div>
    </div>

    <!-- Table -->
    <div class="table-responsive">
        <table class="table table-striped table-bordered align-middle" id="studentsTable">

            <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Registration No</th>
                <th>Full Name</th>
                <th>Email</th>
                <th>DOB</th>
                <th>Status</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="s : ${students}">
                <td th:text="${s.id}">1</td>
                <td th:text="${s.registrationNo}">REG123</td>
                <td th:text="${s.fullName}">John Doe</td>
                <td th:text="${s.email}">john@example.com</td>
                <td th:text="${s.dob}">2000-01-01</td>
                <td th:text="${s.status != null ? s.status.name : ''}">Active</td>
            </tr>
            </tbody>

        </table>
    </div>

    <!-- Pagination -->
	<nav>
	    <ul class="pagination justify-content-center">

	        <!-- Previous -->
	        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
	            <a class="page-link"
	               th:href="@{/admin/dashboard(page=${currentPage - 1}, search=${search})}">
	                Previous
	            </a>
	        </li>

	        <!-- First Page -->
	        <li class="page-item" th:classappend="${currentPage == 0} ? 'active'">
	            <a class="page-link"
	               th:href="@{/admin/dashboard(page=0, search=${search})}">1</a>
	        </li>

	        <!-- Left Dots -->
	        <li class="page-item disabled" th:if="${currentPage > 3}">
	            <span class="page-link">...</span>
	        </li>

	        <!-- Middle Pages -->
	        <li class="page-item"
	            th:each="i : ${#numbers.sequence(currentPage - 2, currentPage + 2)}"
	            th:if="${i > 0 and i < totalPages - 1}"
	            th:classappend="${i == currentPage} ? 'active'">

	            <a class="page-link"
	               th:href="@{/admin/dashboard(page=${i}, search=${search})}"
	               th:text="${i + 1}">
	            </a>
	        </li>

	        <!-- Right Dots -->
	        <li class="page-item disabled" th:if="${currentPage < totalPages - 4}">
	            <span class="page-link">...</span>
	        </li>

	        <!-- Last Page -->
	        <li class="page-item"
	            th:if="${totalPages > 1}"
	            th:classappend="${currentPage == totalPages - 1} ? 'active'">

	            <a class="page-link"
	               th:href="@{/admin/dashboard(page=${totalPages - 1}, search=${search})}"
	               th:text="${totalPages}">
	            </a>
	        </li>

	        <!-- Next -->
	        <li class="page-item"
	            th:classappend="${currentPage == totalPages - 1} ? 'disabled'">

	            <a class="page-link"
	               th:href="@{/admin/dashboard(page=${currentPage + 1}, search=${search})}">
	                Next
	            </a>
	        </li>

	    </ul>
	</nav>

</div>

<!-- Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Search Script (Server-side trigger) -->
<script>
    document.getElementById('studentSearch').addEventListener('change', function () {
        const value = this.value.trim();
        window.location.href = `/admin/dashboard?page=0&search=${value}`;
    });
</script>

</body>
</html>
