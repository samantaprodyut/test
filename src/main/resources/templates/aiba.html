<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Result Portal - AIBA</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">

<!-- HEADER -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5">

    <!-- ================= FORM ================= -->
    <div id="mainContainer">

        <h2 class="mb-4 text-center body-title">Check Your Result - MBA AI & Business Analytics</h2>

        <div id="checkResultForm" class="card p-4 shadow-sm">

            <input type="text" class="form-control mb-3" id="registrationNo" placeholder="Registration Number">
            <input type="email" class="form-control mb-3" id="email" placeholder="Email">
            <input type="date" class="form-control mb-3" id="dob" placeholder="Date of Birth">

            <div class="mb-3 d-flex align-items-center gap-3">
                <img id="captchaImage" src="/captcha" style="height:50px;border:1px solid #ccc;">
                <button type="button" class="btn btn-secondary" id="refreshCaptchaBtn">Refresh</button>
            </div>

            <input type="text" class="form-control mb-3" id="captchaInput" placeholder="Enter CAPTCHA">

            <button type="button" class="btn btn-primary w-100" id="checkResultBtn">
                Check Result
            </button>

        </div>
    </div>

    <!-- RESULT -->
    <div id="resultSection" class="mt-4"></div>

    <!-- BACK BUTTON -->
    <div id="backButtonContainer" class="text-center mt-3" style="display:none;">
        <button class="btn btn-secondary" onclick="showFormAgain()">
            Check Another Result
        </button>
    </div>

</div>

<!-- FOOTER -->
<div th:replace="~{fragments/footer :: footer}"></div>

<div id="successOverlay" class="overlay-hidden">
    <div class="overlay-card">

        <div id="overlayIcon" class="overlay-icon">✔</div>

        <h3 id="overlayTitle">Payment Successful</h3>
        <p id="overlayMessage">Payment completed successfully</p>

        <button id="okRedirectBtn" class="btn btn-success mt-3">
            OK
        </button>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/aiba.js"></script>

</body>
</html>
