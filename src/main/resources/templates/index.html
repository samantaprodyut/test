<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Result Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- Google reCAPTCHA -->
	<script src="https://www.google.com/recaptcha/api.js" async defer></script>

</head>
<body class="d-flex flex-column min-vh-100">

<!-- Header Fragment -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5">
    <h2 class="mb-4 text-center">Check Your Result</h2>

    <!-- Candidate Login Form -->
    <div id="checkResultForm">
        <input type="text" class="form-control mb-3" id="registrationNo" placeholder="Registration Number" required>
        <input type="email" class="form-control mb-3" id="email" placeholder="Email" required>
        <input type="date" class="form-control mb-3" id="dob" required>
		
		<div class="mb-3 d-flex align-items-center gap-3">
		    <img id="captchaImage" src="/captcha" alt="CAPTCHA" style="height:50px;border:1px solid #ccc;">
		    <button type="button" class="btn btn-secondary" id="refreshCaptchaBtn">Refresh</button>
		</div>

		<input type="text" class="form-control mb-3"
		       id="captchaInput"
		       placeholder="Enter CAPTCHA" required>
		<div class="mb-3">
		            <div class="g-recaptcha"
		                 th:attr="data-sitekey=${siteKey}">
		            </div>
		        </div>
        <button type="button" class="btn btn-primary w-100" id="checkResultBtn">Check Result</button>
    </div>

    <!-- Result Section -->
    <div id="resultSection" class="mt-4"></div>
</div>

<!-- Footer Fragment -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/result.js"></script>
</body>
</html>
