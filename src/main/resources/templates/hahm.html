<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <title>Result Portal - MBA Healthcare</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">

<!-- HEADER -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5">

    <!-- ================= FORM ================= -->
    <div id="mainContainer" >
        <div class="mx-auto" style="max-width: 420px;">


            <h2 class="mb-4 text-center body-title">Check Your Result - MBA Healthcare</h2>

            <div id="checkResultForm" class="card p-4 shadow-sm">

                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="registrationNo" placeholder="Registration Number">
                    <label for="registrationNo">Registration Number</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="email" placeholder="Email">
                    <label for="email">Email Address</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="date" class="form-control" id="dob" placeholder="Date of Birth">
                    <label for="dob">Date of Birth</label>
                </div>


                <!-- CAPTCHA (MATCHED STYLE) -->
                <div class="mb-3">
                    <div class="input-group">

        <span class="input-group-text bg-white p-0">
            <img id="captchaImage" src="/captcha"
                 style="height:38px; width:110px; object-fit:cover;">
        </span>

                        <input type="text" class="form-control" id="captchaInput" placeholder="Enter CAPTCHA">

                        <button type="button" class="btn btn-outline-secondary" id="refreshCaptchaBtn">
                            Refresh
                        </button>

                    </div>
                </div>


                <button type="button" class="btn btn-primary px-4" id="checkResultBtn">
                    Check Result
                </button>
            </div>
        </div>
    </div>

    <!-- RESULT -->
    <div id="resultSection" class="mt-4"></div>

    <!-- BACK BUTTON -->
    <div id="backButtonContainer" class="text-center mt-3" style="display:none;">
        <button class="btn btn-secondary" onclick="showFormAgain()">
            Check Another Result
        </button>
    </div>

</div>

<!-- FOOTER -->
<div th:replace="~{fragments/footer :: footer}"></div>

<div id="successOverlay" class="overlay-hidden">
    <div class="overlay-card">

        <div id="overlayIcon" class="overlay-icon">✔</div>

        <h3 id="overlayTitle">Payment Successful</h3>
        <p id="overlayMessage">Payment completed successfully</p>

        <button id="okRedirectBtn" class="btn btn-success mt-3">
            OK
        </button>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/hahm.js"></script>


<!-- Custom Alert Modal -->
<div class="modal fade" id="customAlertModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center p-3">

            <div class="modal-body">
                <p id="alertMessage" class="mb-3 fw-semibold"></p>
                <button class="btn btn-primary px-4" data-bs-dismiss="modal">OK</button>
            </div>

        </div>
    </div>
</div>

</body>
</html>
